services:
  - type: web
    name: prd-generator-backend
    runtime: python
    runtimeVersion: 3.11.9
    plan: hobby
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENAI_API_KEY
        sync: false
