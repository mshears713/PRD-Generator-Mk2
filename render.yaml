services:
  - type: web
    name: prd-generator-backend
    runtime: python
    plan: starter
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: OPENAI_API_KEY
        sync: false

      - key: GITHUB_PAT
        sync: false
