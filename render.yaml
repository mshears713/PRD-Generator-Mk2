services:
  - type: web
    name: prd-generator-backend
    runtime: python
    plan: starter
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_PAT
        sync: false

  - type: web
    name: prd-generator-frontend
    runtime: node
    plan: free
    rootDir: frontend

    buildCommand: npm install && npm run build
    startCommand: npx serve dist

    envVars:
      - key: VITE_API_URL
        value: https://prd-generator-backend.onrender.com
